name: Test Dotfiles

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master
      
      - name: Validate script syntax
        run: |
          bash -n scripts/bootstrap.sh
          bash -n scripts/backup.sh
          bash -n scripts/stow.sh
          bash -n scripts/agent-commander.sh
          bash -n stow/bin/.local/bin/agent-commander
          bash -n stow/bin/.local/share/agent-guardrails/block-dangerous-bash.sh
          bash -n stow/bin/.local/share/agent-guardrails/block-generated-edits.sh
          bash -n stow/claude/.claude/hooks/block-dangerous-bash.sh
          bash -n stow/claude/.claude/hooks/block-generated-edits.sh
          bash -n stow/codex/.codex/hooks/block-dangerous-bash.sh
          bash -n stow/codex/.codex/hooks/block-generated-edits.sh
          bash -n mcp_setup.sh
          echo "✓ Script syntax valid"
      
      - name: Check .gitconfig for SSH rewrite
        run: |
          if grep -E '^\s*insteadOf\s*=' stow/git/.gitconfig; then
            echo "✗ .gitconfig has uncommented SSH URL rewrite"
            exit 1
          fi
          if grep -E '^\s*sshCommand\s*=' stow/git/.gitconfig; then
            echo "✗ .gitconfig has uncommented sshCommand"
            exit 1
          fi
          echo "✓ No active SSH URL rewrite"
      
      - name: Install Homebrew packages
        run: |
          brew bundle --file=Brewfile
          echo "✓ Homebrew packages installed"
      
      - name: Install Oh My Zsh
        run: |
          sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended --keep-zshrc
          [ -d "$HOME/.oh-my-zsh" ] && echo "✓ Oh My Zsh installed"
      
      - name: Install zsh-syntax-highlighting
        run: |
          git clone https://github.com/zsh-users/zsh-syntax-highlighting.git ~/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting
          echo "✓ zsh-syntax-highlighting installed"
      
      - name: Verify Node.js from Brewfile
        run: |
          node --version
          npm --version
          echo "✓ Node.js available"
      
      - name: Stow config files
        run: |
          tmp_home="$(mktemp -d)"
          stow --no-folding -R -t "$tmp_home" -d stow zsh git ghostty herdr nvim bin opencode claude codex pi
          test -L "$tmp_home/.zshrc"
          test -L "$tmp_home/.gitconfig"
          test -L "$tmp_home/.config/nvim/init.lua"
          test -L "$tmp_home/.config/herdr/config.toml"
          test -L "$tmp_home/.local/bin/agent-commander"
          test -L "$tmp_home/.config/opencode/opencode.jsonc"
          test -L "$tmp_home/.config/opencode/tui.json"
          test -L "$tmp_home/.claude/settings.local.json"
          test -L "$tmp_home/.claude/skills/herdr/SKILL.md"
          test -L "$tmp_home/.codex/config.toml"
          test -L "$tmp_home/.codex/hooks.json"
          test -L "$tmp_home/.codex/hooks/block-dangerous-bash.sh"
          test -L "$tmp_home/.codex/hooks/block-generated-edits.sh"
          test -L "$tmp_home/.codex/themes/tokyonight-frsh.tmTheme"
          test -L "$tmp_home/.agents/skills/tldr/SKILL.md"
          test -L "$tmp_home/.pi/agent/settings.json"
          test ! -e "$tmp_home/AGENTS.md"
          echo "✓ Config files stowed"
      
      - name: Validate .zshrc configuration
        run: |
          grep -q 'ZSH_THEME="robbyrussell"' stow/zsh/.zshrc && echo "✓ Theme configured"
          grep -q 'plugins=(git zsh-syntax-highlighting)' stow/zsh/.zshrc && echo "✓ Plugins configured"
      
      - name: Verify Nerd Fonts installed
        run: |
          brew list --cask | grep -q "font-jetbrains-mono-nerd-font" && echo "✓ JetBrainsMono Nerd Font installed"
          brew list --cask | grep -q "font-meslo-lg-nerd-font" && echo "✓ Meslo Nerd Font installed"

  test-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Docker tests
        run: |
          docker build -t dotfiles-test -f test/Dockerfile .
          docker run --rm dotfiles-test
