# Reload tmux.conf
unbind r
bind r source-file ~/.tmux.conf

# Prefix and shell
set -g default-shell /bin/zsh
set -g default-command "exec /bin/zsh"
unbind C-b
set -g prefix C-a
bind C-a send-prefix
set -g repeat-time 0
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g extended-keys on
set -g extended-keys-format csi-u

# Status bar at top
set-option -g status-position top

# Clipboard, mouse, and focus
set -g set-clipboard external
set -g mouse on
set -g focus-events on
setw -g mode-keys vi
set -g status-keys vi
setw -g cursor-style blinking-block

# History and responsiveness
set -g history-limit 10000
set -sg escape-time 0
set -g status-interval 1

# Terminal capabilities (truecolor + undercurl)
# Use tmux's built-in terminal-features instead of hand-written Smulx/Setulc
# overrides. usstyle drives undercurl style and underline colour correctly; a
# malformed Setulc here leaks "E[4:3m" text and garbles redraws.
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB:usstyle:clipboard"
set -as terminal-features ",xterm-256color:RGB:usstyle"

# Splits and windows in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Smart pane switching with Vim awareness
# Uses ps to detect if current pane is running vim/nvim, then either
# sends the key to vim (for split navigation) or switches tmux panes
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# Copy-mode navigation (no vim detection needed)
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# Pane resize
bind -n M-Left resize-pane -L 5
bind -n M-Right resize-pane -R 5
bind -n M-Up resize-pane -U 2
bind -n M-Down resize-pane -D 2

# Utilities
bind C-k clear-history
bind-key R switch-client -r

# Activity
set -g monitor-activity on
set -g visual-activity on

# Plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'janoamaral/tokyo-night-tmux'

# Tokyo Night configuration
set -g @tokyo-night-tmux_theme night
set -g @tokyo-night-tmux_transparent 0
set -g @tokyo-night-tmux_window_id_style none
set -g @tokyo-night-tmux_pane_id_style none
set -g @tokyo-night-tmux_zoom_id_style none
set -g @tokyo-night-tmux_show_datetime 1
set -g @tokyo-night-tmux_date_format hide
set -g @tokyo-night-tmux_time_format 24H
set -g @tokyo-night-tmux_show_path 1
set -g @tokyo-night-tmux_path_format relative
set -g @tokyo-night-tmux_show_git 0
set -g @tokyo-night-tmux_show_music 0
set -g @tokyo-night-tmux_show_netspeed 0
set -g @tokyo-night-tmux_show_wbg 0
set -g @tokyo-night-tmux_show_battery_widget 0
set -g @tokyo-night-tmux_show_hostname 0

# tmux-sessionizer keybind (passes current pane path)
bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer '#{pane_current_path}'"

# Session persistence
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'

# Plain status override for machines without complete Nerd Font glyph coverage.
set -g status-left '#[fg=#1A1B26,bg=#7aa2f7,bold] #{?client_prefix,PREFIX,#S} '
set -g window-status-current-format '#[fg=#73daca,bg=#2A2F41,bold] #I:#W#{?window_zoomed_flag, [Z],} '
set -g window-status-format '#[fg=#a9b1d6,bg=#1A1B26] #I:#W '
set -g status-right '#[fg=#a9b1d6,bg=#2A2F41] #{pane_current_path} #[fg=#1A1B26,bg=#7aa2f7,bold] %H:%M '

# Copy-mode selection visibility override (apply after plugins) - Tokyo Night palette
setw -g mode-style "fg=#1a1b26,bg=#7aa2f7,bold"
set -g copy-mode-selection-style "fg=#1a1b26,bg=#7aa2f7,bold"

# Copy mouse selections to the macOS clipboard on release, then exit copy mode
# so the highlight disappears immediately.
unbind -T copy-mode MouseDragEnd1Pane
unbind -T copy-mode-vi MouseDragEnd1Pane
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode C-S-c send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi C-S-c send-keys -X copy-pipe-and-cancel "pbcopy"
